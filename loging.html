<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RajMart Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#0a0a0a;
position:relative;
}

/* Animated Background */

body::before,
body::after{
content:'';
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(100px);
animation:float 8s infinite ease-in-out;
}

body::before{
background:#ff6b00;
left:-150px;
top:-150px;
opacity:.4;
}

body::after{
background:#ff8c00;
right:-150px;
bottom:-150px;
opacity:.3;
animation-delay:2s;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(50px);}
100%{transform:translateY(0);}
}

/* Login Card */

.login-box{
position:relative;
width:400px;
padding:40px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(20px);
border-radius:25px;
box-shadow:0 0 40px rgba(255,107,0,.3);
animation:fadeUp 1s ease;
z-index:5;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(60px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:40px;
font-weight:700;
color:#ff6b00;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
position:relative;
}

.input-group input{
width:100%;
padding:15px;
background:#111;
border:2px solid #222;
border-radius:12px;
color:white;
font-size:15px;
outline:none;
transition:.3s;
}

.input-group input:focus{
border-color:#ff6b00;
box-shadow:0 0 15px rgba(255,107,0,.4);
}

.toggle{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#ff6b00;
font-size:14px;
}

.options{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:25px;
}

.options a{
color:#ff6b00;
text-decoration:none;
}

.login-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff6b00,#ff8c00);
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(255,107,0,.4);
}

.divider{
text-align:center;
margin:25px 0;
color:#888;
}

.social{
display:flex;
gap:10px;
}

.social button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#151515;
color:white;
cursor:pointer;
transition:.3s;
}

.social button:hover{
background:#ff6b00;
}

.register{
margin-top:25px;
text-align:center;
color:#aaa;
}

.register a{
color:#ff6b00;
text-decoration:none;
font-weight:600;
}

/* Mobile */

@media(max-width:450px){

.login-box{
width:90%;
padding:30px;
}

.logo{
font-size:32px;
}

}

</style>
</head>
<body>

<div class="login-box">

<div class="logo">RajMart</div>

<p class="subtitle">Welcome Back</p>

<form>

<div class="input-group">
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
<span class="toggle" onclick="togglePassword()">Show</span>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>
</div>

<button class="login-btn">
Login
</button>

<div class="divider">
OR CONTINUE WITH
</div>

<div class="social">
<button>Google</button>
<button>GitHub</button>
</div>

<div class="register">
Don't have an account?
<a href="#">Register</a>
</div>

</form>

</div>

<script>

function togglePassword(){

let pass=document.getElementById('password');

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

</script>

</body>
</html>
